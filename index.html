<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>budget tascabile</title>
  <link rel="apple-touch-icon" href="icon.jpg">
  <link rel="icon" href="icon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Roboto Mono', monospace;
      background: #333;
      color: #e0e0e0;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 32px 18px 40px;
      -webkit-tap-highlight-color: transparent;
    }
    .page { display: none; }
    .page.active { display: block; }

    .home-title { font-size: 11px; color: #666; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 20px; }

    .proj-card {
      background: #2e2e2e;
      border: 1px solid #3e3e3e;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .proj-card.archived { opacity: 0.45; }
    .proj-card-body {
      padding: 14px 14px 10px;
      cursor: pointer;
    }
    .proj-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .proj-name { font-size: 13px; font-weight: 700; color: #e0e0e0; }
    .proj-badge { font-size: 9px; padding: 2px 7px; border-radius: 2px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
    .badge-mensile { background: #1a2a3e; color: #60a5fa; }
    .badge-progetto { background: #2a1a3e; color: #c084fc; }
    .badge-archiviato { background: #2a2a2a; color: #666; }
    .proj-bar-wrap { height: 3px; background: #3e3e3e; border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
    .proj-bar-fill { height: 100%; border-radius: 2px; }
    .proj-meta { display: flex; justify-content: space-between; }
    .proj-spent { font-size: 11px; color: #888; }
    .proj-budget-lbl { font-size: 11px; color: #555; }

    .proj-card-actions {
      border-top: 1px solid #3e3e3e;
      display: flex;
    }
    .proj-act-btn {
      flex: 1;
      height: 38px;
      border: none;
      background: none;
      font-size: 10px;
      font-family: 'Roboto Mono', monospace;
      letter-spacing: 0.08em;
      cursor: pointer;
      color: #888;
    }
    .proj-act-btn + .proj-act-btn { border-left: 1px solid #3e3e3e; }
    .proj-act-btn.danger { color: #f87171; }

    .new-proj-btn { width: 100%; height: 48px; border-radius: 6px; border: 1px dashed #484848; background: none; color: #666; font-size: 12px; font-family: 'Roboto Mono', monospace; cursor: pointer; letter-spacing: 0.08em; margin-top: 4px; }
    .new-proj-form { background: #2e2e2e; border: 1px solid #3e3e3e; border-radius: 8px; padding: 14px; margin-top: 12px; display: none; }
    .form-label { font-size: 9px; color: #666; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; display: block; }

    input[type="text"], input[type="number"] {
      display: block;
      width: 100%;
      height: 48px;
      border-radius: 4px;
      border: 1px solid #484848;
      background: #272727;
      color: #e0e0e0;
      padding: 0 12px;
      font-size: 16px;
      font-family: 'Roboto Mono', monospace;
      margin-bottom: 12px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="text"]:focus, input[type="number"]:focus { border-color: #666; }
    input::placeholder { color: #555; }

    .type-row { display: flex; gap: 6px; margin-bottom: 12px; }
    .type-btn { flex: 1; height: 40px; border-radius: 3px; border: 1px solid #484848; background: none; font-size: 12px; font-family: 'Roboto Mono', monospace; color: #888; cursor: pointer; letter-spacing: 0.04em; }
    .type-btn.active-mensile { background: #1a2a3e; color: #60a5fa; border-color: #60a5fa; }
    .type-btn.active-progetto { background: #2a1a3e; color: #c084fc; border-color: #c084fc; }
    .confirm-btns { display: flex; gap: 8px; }

    .back-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; color: #888; font-size: 12px; font-family: 'Roboto Mono', monospace; cursor: pointer; padding: 0; margin-bottom: 20px; letter-spacing: 0.06em; }
    .page-title { font-size: 15px; font-weight: 700; color: #e0e0e0; margin-bottom: 4px; }
    .page-subtitle { font-size: 9px; color: #555; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; }
    .balance-area { margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid #3e3e3e; }
    .balance-lbl { font-size: 10px; color: #777; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 5px; }
    .balance-num { font-size: 40px; font-weight: 700; letter-spacing: -1px; line-height: 1; }
    .balance-sub { font-size: 10px; color: #555; margin-top: 5px; }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
    .stat-card { background: #2e2e2e; border: 1px solid #3e3e3e; border-radius: 8px; padding: 12px; }
    .stat-lbl { font-size: 9px; color: #777; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 5px; }
    .stat-val { font-size: 20px; font-weight: 700; }
    .stat-val.income { color: #4ade80; }
    .stat-val.expense { color: #f87171; }
    .bar-section { margin-bottom: 18px; }
    .budget-input-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .budget-input-wrap label { font-size: 9px; color: #777; letter-spacing: 0.12em; text-transform: uppercase; }
    .budget-input-wrap input { width: 110px; height: 32px; margin-bottom: 0; }
    .bar-lbl-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .bar-lbl { font-size: 9px; color: #777; letter-spacing: 0.1em; text-transform: uppercase; }
    .budget-bar-wrap { height: 4px; background: #3e3e3e; border-radius: 2px; overflow: hidden; }
    .budget-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s, background 0.4s; }
    .divider { height: 1px; background: #3e3e3e; margin: 16px 0; }
    .labels-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; }
    .label-pill { font-size: 11px; padding: 4px 11px; border-radius: 3px; cursor: pointer; border: 1px solid transparent; font-weight: 500; letter-spacing: 0.06em; }
    .label-pill.inactive { opacity: 0.3; }
    .add-form { background: #2e2e2e; border: 1px solid #3e3e3e; border-radius: 8px; padding: 14px; margin-bottom: 16px; }
    .add-form-row { display: flex; gap: 8px; }
    .add-form-row input { flex: 1; margin-bottom: 10px; }
    .add-form-row input:first-child { flex: 2; }
    .label-select-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .label-sel-pill { font-size: 11px; padding: 4px 10px; border-radius: 3px; cursor: pointer; border: 1px solid transparent; font-weight: 500; opacity: 0.35; letter-spacing: 0.04em; }
    .label-sel-pill.selected { opacity: 1; }
    .tx-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 40px; }
    .tx-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: #2e2e2e; border: 1px solid #3e3e3e; border-radius: 6px; }
    .tx-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-desc { font-size: 13px; color: #ccc; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-tag { font-size: 9px; padding: 1px 6px; border-radius: 2px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; display: inline-block; }
    .tx-amount { font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .tx-amount.neg { color: #f87171; }
    .tx-amount.pos { color: #4ade80; }
    .del-btn { width: 28px; height: 28px; border: none; background: none; color: #555; cursor: pointer; font-size: 20px; padding: 0; flex-shrink: 0; }
    .empty-state { text-align: center; padding: 32px; color: #555; font-size: 11px; letter-spacing: 0.08em; }
    .month-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .month-label { font-size: 11px; color: #888; letter-spacing: 0.12em; text-transform: uppercase; }
    .nav-btn { width: 40px; height: 40px; border-radius: 4px; border: 1px solid #484848; background: #3e3e3e; cursor: pointer; color: #aaa; font-size: 20px; font-family: 'Roboto Mono', monospace; }
    .big-btn { height: 52px; border-radius: 4px; border: none; font-size: 14px; font-weight: 700; font-family: 'Roboto Mono', monospace; cursor: pointer; letter-spacing: 0.06em; flex: 1; }
  </style>
</head>
<body>

  <!-- HOME -->
  <div id="page-home" class="page active">
    <div class="home-title">i miei budget</div>
    <div id="proj-list"></div>
    <button class="new-proj-btn" id="open-new-btn" onclick="toggleNewForm()">+ nuovo budget</button>
    <div class="new-proj-form" id="new-proj-form">
      <label class="form-label">nome</label>
      <input type="text" id="new-name" placeholder="es. viaggio tokyo...">
      <label class="form-label">tipo</label>
      <div class="type-row">
        <button class="type-btn active-mensile" id="type-mensile" onclick="setType('mensile')">mensile</button>
        <button class="type-btn" id="type-progetto" onclick="setType('progetto')">progetto</button>
      </div>
      <label class="form-label">budget totale (€)</label>
      <input type="number" id="new-budget" placeholder="es. 1500" min="0">
      <div class="confirm-btns">
        <button class="big-btn" onclick="createProject()" style="background:#4ade80;color:#0d2218;">crea</button>
        <button class="big-btn" onclick="toggleNewForm()" style="background:#2e2e2e;color:#888;border:1px solid #484848;">annulla</button>
      </div>
    </div>
  </div>

  <!-- BUDGET PAGE -->
  <div id="page-budget" class="page">
    <button class="back-btn" onclick="goHome()"><span style="font-size:20px">&#8249;</span> tutti i budget</button>
    <div class="page-title" id="bud-title"></div>
    <div class="page-subtitle" id="bud-subtitle"></div>
    <div id="month-nav-wrap" style="display:none">
      <div class="month-row">
        <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
        <span class="month-label" id="month-lbl"></span>
        <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
      </div>
    </div>
    <div class="balance-area">
      <div class="balance-lbl">saldo</div>
      <div class="balance-num" id="bud-balance">€0.00</div>
      <div class="balance-sub" id="bud-balance-sub"></div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-lbl">entrate</div><div class="stat-val income" id="bud-in">€0.00</div></div>
      <div class="stat-card"><div class="stat-lbl">uscite</div><div class="stat-val expense" id="bud-out">€0.00</div></div>
    </div>
    <div class="bar-section">
      <div class="budget-input-wrap">
        <label for="bud-cap">budget</label>
        <input type="number" id="bud-cap" min="0" oninput="saveCap();renderBudget()">
      </div>
      <div class="bar-lbl-row"><span class="bar-lbl">utilizzo</span><span class="bar-lbl" id="bud-pct">0%</span></div>
      <div class="budget-bar-wrap"><div class="budget-bar-fill" id="bud-bar" style="width:0%;background:#4ade80"></div></div>
    </div>
    <div class="divider"></div>
    <div class="labels-row" id="bud-filter-labels"></div>
    <div class="add-form">
      <div class="add-form-row">
        <input type="text" id="inp-desc" placeholder="descrizione...">
        <input type="number" id="inp-amt" placeholder="€" step="0.01">
      </div>
      <div class="label-select-row" id="label-selector"></div>
      <div style="display:flex;gap:8px;">
        <button class="big-btn" onclick="addTx(1)" style="background:#4ade80;color:#0d2218;">+ entrata</button>
        <button class="big-btn" onclick="addTx(-1)" style="background:#f87171;color:#2a0808;">− uscita</button>
      </div>
    </div>
    <div class="tx-list" id="bud-tx-list"></div>
  </div>

<script>
const LABELS=[
  {id:'cibo',name:'cibo',bg:'#1a3326',color:'#4ade80',dot:'#4ade80'},
  {id:'casa',name:'casa',bg:'#1a2a3e',color:'#60a5fa',dot:'#60a5fa'},
  {id:'svago',name:'svago',bg:'#2a1a3e',color:'#c084fc',dot:'#c084fc'},
  {id:'trasporti',name:'trasporti',bg:'#3e2e1a',color:'#fbbf24',dot:'#fbbf24'},
  {id:'salute',name:'salute',bg:'#3e1a2a',color:'#f472b6',dot:'#f472b6'},
  {id:'altro',name:'altro',bg:'#383838',color:'#aaa',dot:'#aaa'},
];
const MONTHS=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];

let data={projects:[],transactions:[]};
try{data=JSON.parse(localStorage.getItem('budget_app_v1')||'null')||{projects:[],transactions:[]};}catch(e){}
if(!data.projects.find(p=>p.id==='__mensile__')){
  data.projects.unshift({id:'__mensile__',name:'budget mensile',type:'mensile',budget:1500,archived:false,created:Date.now()});
  save();
}

let currentProjectId=null;
let currentMonth=new Date().getMonth();
let currentYear=new Date().getFullYear();
let selectedLabel=LABELS[0].id;
let activeFilter=null;
let newType='mensile';
let newFormOpen=false;

function save(){try{localStorage.setItem('budget_app_v1',JSON.stringify(data))}catch(e){}}
function getLabel(id){return LABELS.find(l=>l.id===id)||LABELS[LABELS.length-1]}
function getProject(id){return data.projects.find(p=>p.id===id)}

function setType(t){
  newType=t;
  document.getElementById('type-mensile').className='type-btn'+(t==='mensile'?' active-mensile':'');
  document.getElementById('type-progetto').className='type-btn'+(t==='progetto'?' active-progetto':'');
}

function toggleNewForm(){
  newFormOpen=!newFormOpen;
  document.getElementById('new-proj-form').style.display=newFormOpen?'block':'none';
  document.getElementById('open-new-btn').style.display=newFormOpen?'none':'block';
  if(newFormOpen){document.getElementById('new-name').value='';document.getElementById('new-budget').value='';setType('mensile');}
}

function createProject(){
  const name=document.getElementById('new-name').value.trim();
  const budget=parseFloat(document.getElementById('new-budget').value)||0;
  if(!name)return;
  data.projects.push({id:'proj_'+Date.now(),name,type:newType,budget,archived:false,created:Date.now()});
  save();toggleNewForm();renderHome();
}

function archiveProject(id){
  const p=getProject(id);if(!p)return;
  p.archived=!p.archived;save();renderHome();
}

let pendingDelete=null;
function deleteProject(id){
  if(pendingDelete===id){
    data.projects=data.projects.filter(p=>p.id!==id);
    data.transactions=data.transactions.filter(t=>t.projectId!==id);
    pendingDelete=null;
    save();renderHome();
  } else {
    pendingDelete=id;
    renderHome();
    setTimeout(()=>{if(pendingDelete===id){pendingDelete=null;renderHome();}},3000);
  }
}

function openProject(id){
  currentProjectId=id;activeFilter=null;selectedLabel=LABELS[0].id;
  const proj=getProject(id);
  document.getElementById('bud-title').textContent=proj.name;
  document.getElementById('bud-subtitle').textContent=proj.type==='mensile'?'budget mensile':'progetto';
  if(proj.type==='mensile'){
    const key=currentYear+'-'+currentMonth;
    document.getElementById('bud-cap').value=(proj.monthlyBudgets&&proj.monthlyBudgets[key])||0;
  } else {
    document.getElementById('bud-cap').value=proj.budget||0;
  }
  document.getElementById('month-nav-wrap').style.display=proj.type==='mensile'?'block':'none';
  document.getElementById('page-home').className='page';
  document.getElementById('page-budget').className='page active';
  window.scrollTo(0,0);
  renderBudget();
}

function goHome(){
  currentProjectId=null;
  document.getElementById('page-budget').className='page';
  document.getElementById('page-home').className='page active';
  window.scrollTo(0,0);
  renderHome();
}

function saveCap(){
  const proj=getProject(currentProjectId);if(!proj)return;
  if(proj.type==='mensile'){
    if(!proj.monthlyBudgets) proj.monthlyBudgets={};
    const key=currentYear+'-'+currentMonth;
    proj.monthlyBudgets[key]=parseFloat(document.getElementById('bud-cap').value)||0;
  } else {
    proj.budget=parseFloat(document.getElementById('bud-cap').value)||0;
  }
  save();
}

function changeMonth(d){
  currentMonth+=d;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  const proj=getProject(currentProjectId);
  if(proj&&proj.type==='mensile'){
    const key=currentYear+'-'+currentMonth;
    document.getElementById('bud-cap').value=(proj.monthlyBudgets&&proj.monthlyBudgets[key])||0;
  }
  renderBudget();
}

function getTxs(){
  const proj=getProject(currentProjectId);
  let txs=data.transactions.filter(t=>t.projectId===currentProjectId);
  if(proj&&proj.type==='mensile') txs=txs.filter(t=>t.month===currentMonth&&t.year===currentYear);
  return txs;
}

function addTx(sign){
  const desc=document.getElementById('inp-desc').value.trim();
  const amt=parseFloat(document.getElementById('inp-amt').value);
  if(!desc||isNaN(amt)||amt<=0)return;
  data.transactions.push({id:Date.now(),projectId:currentProjectId,desc,amount:sign*amt,label:selectedLabel,month:currentMonth,year:currentYear});
  save();
  document.getElementById('inp-desc').value='';
  document.getElementById('inp-amt').value='';
  renderBudget();
}

function deleteTx(id){data.transactions=data.transactions.filter(t=>t.id!==id);save();renderBudget();}

function renderHome(){
  const list=document.getElementById('proj-list');
  list.innerHTML='';
  const active=data.projects.filter(p=>!p.archived);
  const archived=data.projects.filter(p=>p.archived);
  [...active,...archived].forEach(proj=>{
    const txs=data.transactions.filter(t=>t.projectId===proj.id);
    const spent=Math.abs(txs.filter(t=>t.amount<0).reduce((s,t)=>s+t.amount,0));
    const pct=proj.budget>0?Math.min(100,Math.round(spent/proj.budget*100)):0;
    const barColor=pct>90?'#f87171':pct>65?'#fbbf24':'#4ade80';
    const isFixed=proj.id==='__mensile__';
    const badgeClass=proj.archived?'badge-archiviato':proj.type==='mensile'?'badge-mensile':'badge-progetto';
    const badgeLabel=proj.archived?'archiviato':proj.type==='mensile'?'mensile':'progetto';

    const card=document.createElement('div');
    card.className='proj-card'+(proj.archived?' archived':'');

    // corpo cliccabile separato dai bottoni
    const body=document.createElement('div');
    body.className='proj-card-body';
    if(!proj.archived){
      body.addEventListener('click',function(){openProject(proj.id);});
    }
    body.innerHTML=`
      <div class="proj-card-top">
        <div class="proj-name">${proj.name}</div>
        <span class="proj-badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="proj-bar-wrap"><div class="proj-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <div class="proj-meta">
        <span class="proj-spent">€${spent.toFixed(2)} spesi</span>
        <span class="proj-budget-lbl">/ €${(proj.budget||0).toFixed(0)}</span>
      </div>
    `;
    card.appendChild(body);

    // barra azioni separata, completamente fuori dal body cliccabile
    if(!isFixed){
      const actions=document.createElement('div');
      actions.className='proj-card-actions';

      const archBtn=document.createElement('button');
      archBtn.className='proj-act-btn';
      archBtn.textContent=proj.archived?'riattiva':'archivia';
      archBtn.addEventListener('click',function(e){
        e.stopPropagation();
        archiveProject(proj.id);
      });

      const delBtn=document.createElement('button');
      delBtn.className='proj-act-btn danger';
      delBtn.textContent=pendingDelete===proj.id?'sicuro?':'elimina';
      if(pendingDelete===proj.id) delBtn.style.background='#3d1a1a';
      delBtn.addEventListener('click',function(e){
        e.stopPropagation();
        deleteProject(proj.id);
      });

      actions.appendChild(archBtn);
      actions.appendChild(delBtn);
      card.appendChild(actions);
    }

    list.appendChild(card);
  });
}

function renderFilterLabels(){
  const c=document.getElementById('bud-filter-labels');c.innerHTML='';
  const all=document.createElement('span');
  all.className='label-pill '+(activeFilter===null?'active':'inactive');
  all.style.cssText='background:#383838;color:#aaa;border-color:#484848';
  all.textContent='tutte';
  all.addEventListener('click',function(){activeFilter=null;renderBudget();});
  c.appendChild(all);
  LABELS.forEach(l=>{
    const sp=document.createElement('span');
    sp.className='label-pill '+(activeFilter===l.id?'active':'inactive');
    sp.style.cssText=`background:${l.bg};color:${l.color};border-color:${activeFilter===l.id?l.color:'transparent'}`;
    sp.textContent=l.name;
    sp.addEventListener('click',function(){activeFilter=activeFilter===l.id?null:l.id;renderBudget();});
    c.appendChild(sp);
  });
}

function renderLabelSelector(){
  const c=document.getElementById('label-selector');c.innerHTML='';
  LABELS.forEach(l=>{
    const sp=document.createElement('span');
    sp.className='label-sel-pill '+(selectedLabel===l.id?'selected':'');
    sp.style.cssText=`background:${l.bg};color:${l.color};border-color:${selectedLabel===l.id?l.color:'transparent'}`;
    sp.textContent=l.name;
    sp.addEventListener('click',function(){selectedLabel=l.id;renderLabelSelector();});
    c.appendChild(sp);
  });
}

function renderBudget(){
  const proj=getProject(currentProjectId);if(!proj)return;
  if(proj.type==='mensile') document.getElementById('month-lbl').textContent=MONTHS[currentMonth]+' '+currentYear;
  const txs=getTxs();
  const totalIn=txs.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const totalOut=txs.filter(t=>t.amount<0).reduce((s,t)=>s+t.amount,0);
  const balance=totalIn+totalOut;
  document.getElementById('bud-in').textContent='€'+totalIn.toFixed(2);
  document.getElementById('bud-out').textContent='€'+Math.abs(totalOut).toFixed(2);
  const bn=document.getElementById('bud-balance');
  bn.textContent=(balance>=0?'+':'')+'€'+balance.toFixed(2);
  bn.style.color=balance>=0?'#4ade80':'#f87171';
  let cap;
  if(proj.type==='mensile'){
    const key=currentYear+'-'+currentMonth;
    cap=(proj.monthlyBudgets&&proj.monthlyBudgets[key])||0;
  } else {
    cap=proj.budget||0;
  }
  const spent=Math.abs(totalOut);
  const pct=cap>0?Math.min(100,Math.round(spent/cap*100)):0;
  document.getElementById('bud-pct').textContent=pct+'%';
  const bar=document.getElementById('bud-bar');
  bar.style.width=pct+'%';
  bar.style.background=pct>90?'#f87171':pct>65?'#fbbf24':'#4ade80';
  document.getElementById('bud-balance-sub').textContent=cap>0?'budget rimanente: €'+Math.max(0,cap-spent).toFixed(2):'nessun budget impostato';
  renderFilterLabels();renderLabelSelector();
  const filtered=activeFilter?txs.filter(t=>t.label===activeFilter):txs;
  const listEl=document.getElementById('bud-tx-list');
  if(filtered.length===0){listEl.innerHTML='<div class="empty-state">// nessuna transazione</div>';return;}
  listEl.innerHTML='';
  [...filtered].reverse().forEach(t=>{
    const lbl=getLabel(t.label);
    const item=document.createElement('div');item.className='tx-item';
    item.innerHTML=`
      <div class="tx-dot" style="background:${lbl.dot}"></div>
      <div class="tx-info">
        <div class="tx-desc">${t.desc}</div>
        <span class="tx-tag" style="background:${lbl.bg};color:${lbl.color}">${lbl.name}</span>
      </div>
      <div class="tx-amount ${t.amount>=0?'pos':'neg'}">${t.amount>=0?'+':''}€${Math.abs(t.amount).toFixed(2)}</div>
      <button class="del-btn" onclick="deleteTx(${t.id})">×</button>
    `;
    listEl.appendChild(item);
  });
}

renderHome();
</script>
</body>
</html>
