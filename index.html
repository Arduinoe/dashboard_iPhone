<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #e8dcc8;
  --accent2: #a8c4b8;
  --glass: rgba(10,10,8,0.52);
  --glass-border: rgba(255,255,255,0.10);
  --text: rgba(255,255,255,0.92);
  --text-dim: rgba(255,255,255,0.50);
  --tab-h: 72px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
  --font: 'Roboto Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  font-family: var(--font);
  color: var(--text);
  background: #0a0a08;
}

/* ── BACKGROUNDS ── */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background-size: cover;
  background-position: center;
  transition: opacity 2.6s ease;
  opacity: 0;
}
.bg-layer.active { opacity: 1; }

.bg-overlay {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.30) 0%,
    rgba(0,0,0,0.10) 40%,
    rgba(0,0,0,0.50) 100%
  );
}

.grain {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  opacity: 0.16;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size: 180px 180px;
}

/* ── APP SHELL ── */
#app {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
}

.pages {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.page {
  position: absolute; inset: 0;
  padding-top: calc(var(--safe-top) + 18px);
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px);
  padding-left: 18px; padding-right: 18px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  opacity: 0; pointer-events: none;
  transform: translateY(10px);
  transition: opacity 0.28s ease, transform 0.28s ease;
}
.page.active {
  opacity: 1; pointer-events: auto;
  transform: translateY(0);
}
.page::-webkit-scrollbar { display: none; }

/* ── CARDS ── */
.card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 20px 18px;
  margin-bottom: 12px;
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
}

.card-label {
  font-size: 8.5px;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 12px;
  font-weight: 500;
}

/* ── CLOCK ── */
.clock-card {
  text-align: center;
  padding: 30px 18px 24px;
}

.clock-time {
  font-size: 82px;
  font-weight: 300;
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--accent);
}

.clock-date {
  font-size: 9.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 12px;
  font-weight: 400;
}

/* ── WEATHER ── */
.wx-city-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.wx-city-input {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  padding: 10px 14px;
  outline: none;
  letter-spacing: 0.04em;
}
.wx-city-input::placeholder { color: var(--text-dim); }

.wx-go-btn {
  background: rgba(255,255,255,0.09);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  color: var(--accent);
  font-family: var(--font);
  font-size: 13px;
  padding: 10px 16px;
  cursor: pointer;
  letter-spacing: 0.05em;
}

.wx-top {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 16px;
}

.wx-icon {
  width: 56px; height: 56px;
  flex-shrink: 0;
  color: var(--accent);
}
.wx-icon svg {
  width: 100%; height: 100%;
}

.wx-main { flex: 1; }

.wx-temp {
  font-size: 50px;
  font-weight: 300;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -0.02em;
}

.wx-cond {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  margin-top: 5px;
  text-transform: uppercase;
  font-weight: 400;
}

.wx-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}

.wx-detail {
  background: rgba(255,255,255,0.05);
  border-radius: 11px;
  padding: 10px 12px;
}

.wx-detail-label {
  font-size: 8px;
  letter-spacing: 0.14em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 500;
}

.wx-detail-val {
  font-size: 14px;
  font-weight: 400;
  color: var(--accent);
  letter-spacing: 0.02em;
}

.wx-update {
  font-size: 9px;
  color: var(--text-dim);
  text-align: right;
  margin-top: 10px;
  letter-spacing: 0.06em;
}

/* ── MOON & HISTORY ── */
.moon-row {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 16px;
}

.moon-glyph {
  font-size: 46px;
  line-height: 1;
}

.moon-name {
  font-size: 16px;
  font-weight: 400;
  color: var(--accent);
  letter-spacing: 0.04em;
}

.moon-pct {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  letter-spacing: 0.08em;
}

.history-divider {
  height: 1px;
  background: var(--glass-border);
  margin: 14px 0;
}

.history-year {
  font-size: 32px;
  font-weight: 300;
  color: var(--accent2);
  line-height: 1;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.history-text {
  font-size: 12px;
  line-height: 1.65;
  color: var(--text-dim);
  font-weight: 300;
}

.history-nav {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}

.hist-btn {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  color: var(--text-dim);
  font-size: 15px;
  padding: 9px;
  cursor: pointer;
  font-family: var(--font);
  transition: color 0.2s;
}
.hist-btn:active { color: var(--accent); }

/* ── NEWS ── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  padding: 0 2px;
}

.page-title {
  font-size: 8.5px;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 500;
}

.refresh-btn {
  background: none; border: none;
  color: var(--text-dim); font-size: 18px;
  cursor: pointer; padding: 4px 6px;
  font-family: var(--font);
  transition: color 0.2s;
}
.refresh-btn:active { color: var(--accent); }

.news-item {
  padding: 13px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  cursor: pointer;
  transition: opacity 0.15s;
}
.news-item:last-child { border-bottom: none; padding-bottom: 0; }
.news-item:active { opacity: 0.55; }

.news-title {
  font-size: 12px;
  line-height: 1.55;
  color: var(--text);
  margin-bottom: 4px;
  font-weight: 400;
  letter-spacing: 0.01em;
}

.news-time {
  font-size: 9px;
  color: var(--accent2);
  letter-spacing: 0.10em;
}

.spinner {
  text-align: center;
  color: var(--text-dim);
  font-size: 10px;
  padding: 24px 0;
  letter-spacing: 0.12em;
}

/* ── NOTE ── */
.note-textarea {
  width: 100%;
  min-height: 300px;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 300;
  line-height: 1.8;
  outline: none;
  resize: none;
  -webkit-appearance: none;
  letter-spacing: 0.02em;
}
.note-textarea::placeholder {
  color: var(--text-dim);
}

.note-meta {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.10em;
  margin-top: 10px;
  text-align: right;
}

/* ── TAB BAR ── */
.tabbar {
  position: relative; z-index: 20;
  display: flex;
  height: calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(6,6,4,0.76);
  backdrop-filter: blur(36px);
  -webkit-backdrop-filter: blur(36px);
  border-top: 1px solid var(--glass-border);
}

.tab-btn {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px;
  background: none; border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding-top: 8px;
  transition: color 0.2s;
  font-family: var(--font);
}
.tab-btn.active { color: var(--accent); }

.tab-icon {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.tab-icon svg {
  width: 20px; height: 20px;
}

.tab-label {
  font-size: 8.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 500;
}

/* ── BG DOTS ── */
.bg-dots {
  position: fixed;
  top: calc(var(--safe-top) + 16px);
  right: 18px;
  z-index: 30;
  display: flex;
  gap: 6px;
  align-items: center;
}

.bg-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.28);
  cursor: pointer;
  transition: background 0.3s, transform 0.2s;
}
.bg-dot.active {
  background: var(--accent);
  transform: scale(1.5);
}
</style>
</head>

};


var WMO_TEXT = {'0':'Sereno','1':'Quasi sereno','2':'Parz. nuvoloso','3':'Coperto','45':'Nebbia','48':'Nebbia gelata','51':'Pioggerella','53':'Pioggerella mod.','55':'Pioggerella','61':'Pioggia lieve','63':'Pioggia','65':'Pioggia forte','71':'Neve lieve','73':'Neve','75':'Neve forte','77':'Nevischio','80':'Rovesci','81':'Rovesci mod.','82':'Rovesci forti','85':'Neve e pioggia','86':'Neve e pioggia','95':'Temporale','96':'Temp. grandine','99':'Temp. forte'};
var WMO_ICON_KEY = {'0':'sun','1':'partly','2':'partly','3':'cloudy','45':'fog','48':'fog','51':'rain','53':'rain','55':'rain','61':'rain','63':'rain','65':'rain','71':'snow','73':'snow','75':'snow','77':'sleet','80':'rain','81':'rain','82':'storm','85':'sleet','86':'sleet','95':'storm','96':'storm','99':'storm'};

/* ── BACKGROUNDS ── */
var currentBg = 0;
function setBg(idx) {
  document.querySelectorAll('.bg-layer').forEach(function(el, i) { el.classList.toggle('active', i === idx); });
  document.querySelectorAll('.bg-dot').forEach(function(el, i) { el.classList.toggle('active', i === idx); });
  currentBg = idx;
  try { localStorage.setItem('dash_bg', idx); } catch(e) {}
}
setInterval(function() { setBg((currentBg + 1) % 3); }, 40000);
try {
  var sb = parseInt(localStorage.getItem('dash_bg'));
  setBg(isNaN(sb) ? 0 : sb);
} catch(e) { setBg(0); }

/* ── TABS ── */
function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

/* ── CLOCK ── */
function updateClock() {
  var now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
  document.getElementById('datestr').textContent = now.toLocaleDateString('it-IT', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
}
updateClock();
setInterval(updateClock, 1000);

/* ── WEATHER ── */
function getIcon(code) {
  var key = WMO_ICON_KEY[String(code)] || 'sun';
  return SVG_ICONS[key] || SVG_ICONS['sun'];
}

function loadWeather() {
  var city = (document.getElementById('cityInput').value.trim()) || 'Roma';
  try { localStorage.setItem('dash_city', city); } catch(e) {}
  fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(city) + '&count=1&language=it')
    .then(function(r) { return r.json(); })
    .then(function(gd) {
      if (!gd.results || !gd.results.length) throw new Error('città non trovata');
      var lat = gd.results[0].latitude, lon = gd.results[0].longitude;
      return fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,visibility,weather_code&wind_speed_unit=kmh&timezone=auto');
    })
    .then(function(r) { return r.json(); })
    .then(function(wd) {
      var c = wd.current, code = c.weather_code;
      document.getElementById('wIcon').innerHTML = getIcon(code);
      document.getElementById('wTemp').textContent = Math.round(c.temperature_2m) + '°';
      document.getElementById('wCond').textContent = WMO_TEXT[String(code)] || '';
      document.getElementById('wFeel').textContent = Math.round(c.apparent_temperature) + '°C';
      document.getElementById('wHum').textContent = Math.round(c.relative_humidity_2m) + '%';
      document.getElementById('wWind').textContent = Math.round(c.wind_speed_10m) + ' km/h';
      var vis = c.visibility;
      document.getElementById('wVis').textContent = vis >= 1000 ? Math.round(vis/1000) + ' km' : Math.round(vis) + ' m';
      document.getElementById('lastUpdate').textContent = 'agg. ' + new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
    })
    .catch(function(e) { document.getElementById('wCond').textContent = e.message; });
}

document.getElementById('cityInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { this.blur(); loadWeather(); }
});
try {
  var sc = localStorage.getItem('dash_city');
  if (sc) document.getElementById('cityInput').value = sc;
} catch(e) {}
loadWeather();
setInterval(loadWeather, 600000);

/* ── MOON ── */
function moonPhase() {
  var now = new Date();
  var known = new Date(2000, 0, 6, 18, 14, 0);
  var diff = (now - known) / 86400000;
  var cycle = 29.53058867;
  var phase = ((diff % cycle) + cycle) % cycle;
  var pct = phase / cycle;
  var names = ['Luna nuova','Luna crescente','Quarto crescente','Gibbosa crescente','Luna piena','Gibbosa calante','Ultimo quarto','Falce calante'];
  var glyphs = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];
  var idx = Math.round(pct * 8) % 8;
  document.getElementById('moonGlyph').textContent = glyphs[idx];
  document.getElementById('moonName').textContent = names[idx];
  document.getElementById('moonPct').textContent = Math.round(pct * 100) + '% del ciclo';
}
moonPhase();

/* ── HISTORY ── */
var histEvents = [], histIdx = 0;
function loadHistory() {
  var now = new Date();
  var m = now.getMonth() + 1, d = now.getDate();
  fetch('https://api.wikimedia.org/feed/v1/wikipedia/it/onthisday/events/' + m + '/' + d)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      histEvents = data.events || [];
      if (!histEvents.length) throw new Error('vuoto');
      histIdx = Math.floor(Math.random() * histEvents.length);
      showHistEvent();
    })
    .catch(function() {
      var now2 = new Date();
      fetch('https://api.wikimedia.org/feed/v1/wikipedia/en/onthisday/events/' + (now2.getMonth()+1) + '/' + now2.getDate())
        .then(function(r) { return r.json(); })
        .then(function(data) {
          histEvents = data.events || [];
          if (histEvents.length) { histIdx = Math.floor(Math.random() * histEvents.length); showHistEvent(); }
          else document.getElementById('historyText').textContent = 'non disponibile';
        })
        .catch(function() { document.getElementById('historyText').textContent = 'non disponibile'; });
    });
}
function showHistEvent() {
  if (!histEvents.length) return;
  var ev = histEvents[histIdx];
  document.getElementById('historyYear').textContent = ev.year;
  document.getElementById('historyText').textContent = ev.text;
}
function historyPrev() { if (!histEvents.length) return; histIdx = (histIdx - 1 + histEvents.length) % histEvents.length; showHistEvent(); }
function historyNext() { if (!histEvents.length) return; histIdx = (histIdx + 1) % histEvents.length; showHistEvent(); }
loadHistory();

/* ── NEWS ── */
function isAd(t) {
  t = t.toLowerCase();
  var w = ['save $','% off','deal','now just','coupon','discount','limited time','buy now'];
  for (var i = 0; i < w.length; i++) { if (t.indexOf(w[i]) !== -1) return true; }
  return false;
}
function loadNews() {
  var el = document.getElementById('newsList');
  el.innerHTML = '<div class="spinner">carico...</div>';
  fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent('https://www.ansa.it/sito/ansait_rss.xml'))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status !== 'ok' || !data.items || !data.items.length) throw new Error('feed vuoto');
      var items = data.items.filter(function(it) { return !isAd(it.title || ''); });
      items.sort(function(a, b) { return new Date(b.pubDate) - new Date(a.pubDate); });
      var html = '';
      for (var i = 0; i < Math.min(items.length, 12); i++) {
        var it = items[i];
        var title = (it.title || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        var link = (it.link || '#').trim();
        var t = ''; try { t = new Date(it.pubDate).toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'}); } catch(ex) {}
        html += '<div class="news-item" data-href="' + link + '"><div class="news-title">' + title + '</div>' + (t ? '<div class="news-time">' + t + '</div>' : '') + '</div>';
      }
      el.innerHTML = html;
      el.querySelectorAll('.news-item').forEach(function(item) {
        item.addEventListener('click', function() { var h = this.getAttribute('data-href'); if(h) window.open(h,'_blank'); });
      });
    })
    .catch(function(e) { el.innerHTML = '<div class="spinner">errore: ' + e.message + '</div>'; });
}
function refreshNews() {
  var btn = document.getElementById('refreshBtn');
  btn.style.transition = 'transform 0.5s';
  btn.style.transform = 'rotate(360deg)';
  setTimeout(function() { btn.style.transition = ''; btn.style.transform = ''; }, 550);
  loadNews();
}
loadNews();
setInterval(loadNews, 300000);

/* ── NOTE ── */
function loadNote() {
  try {
    var n = localStorage.getItem('dash_note');
    if (n) document.getElementById('noteArea').value = n;
  } catch(e) {}
}
function saveNote() {
  try {
    var val = document.getElementById('noteArea').value;
    localStorage.setItem('dash_note', val);
    var wc = val.trim() ? val.trim().split(/\s+/).length : 0;
    document.getElementById('noteMeta').textContent = wc ? wc + ' parole' : '';
  } catch(e) {}
}
document.getElementById('noteArea').addEventListener('input', saveNote);
loadNote();

</script>
