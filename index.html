html, body { height: 100%; width: 100%; overflow: hidden; font-family: var(--font); color: var(--text); background: #080808; }

#bgCanvas { position: fixed; inset: 0; z-index: 0; transition: background 1.2s ease; }

#app { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; }
.pages { flex: 1; overflow: hidden; position: relative; }
.page { position: absolute; inset: 0;
  padding-top: calc(var(--safe-top) + 18px);
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px);
  padding-left: 18px; padding-right: 18px;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  opacity: 0; pointer-events: none; transform: translateY(10px);
  transition: opacity 0.28s ease, transform 0.28s ease; }
.page.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
.page::-webkit-scrollbar { display: none; }

.card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; padding: 20px 18px; margin-bottom: 12px; backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); transition: background 0.6s, border-color 0.6s; }
.card-label { font-size: 8.5px; letter-spacing: 0.20em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; font-weight: 500; transition: color 0.6s; }

/* CLOCK */
.clock-card { text-align: center; padding: 30px 18px 24px; }
.clock-time { font-size: 82px; font-weight: 300; letter-spacing: -0.03em; line-height: 1; color: var(--accent); transition: color 0.4s; }
.clock-date { font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); margin-top: 12px; transition: color 0.6s; }

/* WEATHER */
.wx-city-row { position: relative; margin-bottom: 16px; display: flex; }
.wx-city-input { flex: 1; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 10px 0 0 10px; color: var(--text); font-family: var(--font); font-size: 16px; padding: 10px 14px; outline: none; letter-spacing: 0.04em; transition: background 0.6s, color 0.6s, border-color 0.6s; }
.wx-city-input::placeholder { color: var(--text-dim); }
.wx-go-btn { background: var(--input-bg); border: 1px solid var(--glass-border); border-left: none; border-radius: 0 10px 10px 0; color: var(--accent); font-family: var(--font); font-size: 14px; padding: 0 16px; cursor: pointer; white-space: nowrap; transition: color 0.4s, background 0.6s; }
.autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
  background: var(--autocomplete-bg); border: 1px solid var(--glass-border); border-top: none; border-radius: 0 0 12px 12px;
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); overflow: hidden; }
.autocomplete-item { padding: 11px 14px; font-size: 13px; color: var(--text); cursor: pointer; border-bottom: 1px solid rgba(128,128,128,0.12); letter-spacing: 0.03em; }
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:active { background: rgba(128,128,128,0.10); }
.autocomplete-sub { font-size: 9px; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.05em; }
.wx-top { display: flex; align-items: center; gap: 18px; margin-bottom: 16px; }
.wx-icon { width: 56px; height: 56px; flex-shrink: 0; color: var(--accent); transition: color 0.4s; }
.wx-icon svg { width: 100%; height: 100%; }
.wx-temp { font-size: 50px; font-weight: 300; color: var(--accent); line-height: 1; letter-spacing: -0.02em; transition: color 0.4s; }
.wx-cond { font-size: 10px; letter-spacing: 0.12em; color: var(--text-dim); margin-top: 5px; text-transform: uppercase; transition: color 0.6s; }
.wx-details { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.wx-detail { background: var(--detail-bg); border-radius: 11px; padding: 10px 12px; transition: background 0.6s; }
.wx-detail-label { font-size: 8px; letter-spacing: 0.14em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; font-weight: 500; transition: color 0.6s; }
.wx-detail-val { font-size: 14px; color: var(--accent); letter-spacing: 0.02em; transition: color 0.4s; }
.wx-update { font-size: 9px; color: var(--text-dim); text-align: right; margin-top: 10px; letter-spacing: 0.06em; transition: color 0.6s; }

/* MOON */
.moon-row { display: flex; align-items: center; gap: 18px; margin-bottom: 16px; }
.moon-glyph { font-size: 40px; line-height: 1; color: var(--accent); transition: color 0.4s; font-weight: 300; }
.moon-name { font-size: 16px; font-weight: 400; color: var(--accent); letter-spacing: 0.04em; transition: color 0.4s; }
.moon-pct { font-size: 10px; color: var(--text-dim); margin-top: 4px; letter-spacing: 0.08em; transition: color 0.6s; }
.history-divider { height: 1px; background: var(--glass-border); margin: 14px 0; transition: background 0.6s; }
.history-year { font-size: 32px; font-weight: 300; color: var(--accent); line-height: 1; margin-bottom: 8px; letter-spacing: -0.02em; transition: color 0.4s; }
.history-text { font-size: 12px; line-height: 1.65; color: var(--text-dim); font-weight: 300; transition: color 0.6s; }
.history-nav { display: flex; gap: 8px; margin-top: 14px; }
.hist-btn { flex: 1; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-dim); font-size: 15px; padding: 9px; cursor: pointer; font-family: var(--font); transition: color 0.2s, background 0.6s; }
.hist-btn:active { color: var(--accent); }

/* NEWS */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 0 2px; }
.page-title { font-size: 8.5px; letter-spacing: 0.20em; text-transform: uppercase; color: var(--text-dim); font-weight: 500; transition: color 0.6s; }
.refresh-btn { background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; padding: 4px 6px; font-family: var(--font); transition: color 0.6s; }
.refresh-btn:active { color: var(--accent); }
.feed-tabs { display: flex; gap: 5px; margin-bottom: 12px; }
.feed-tab { flex: 1; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-dim); font-family: var(--font); font-size: 8.5px; letter-spacing: 0.10em; text-transform: uppercase; padding: 8px 2px; cursor: pointer; transition: all 0.2s; text-align: center; }
.feed-tab.active { background: rgba(128,128,128,0.18); color: var(--accent); border-color: rgba(128,128,128,0.3); }
.news-item { padding: 13px 0; border-bottom: 1px solid var(--glass-border); cursor: pointer; transition: opacity 0.15s; }
.news-item:last-child { border-bottom: none; padding-bottom: 0; }
.news-item:active { opacity: 0.55; }
.news-title { font-size: 12px; line-height: 1.55; color: var(--text); margin-bottom: 4px; font-weight: 400; letter-spacing: 0.01em; transition: color 0.6s; }
.news-time { font-size: 9px; color: var(--accent); letter-spacing: 0.10em; transition: color 0.4s; }
.spinner { text-align: center; color: var(--text-dim); font-size: 10px; padding: 24px 0; letter-spacing: 0.12em; }

/* NOTES — LIST VIEW */
.notes-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 0 2px; }
.notes-new-btn { background: none; border: none; color: var(--accent); font-size: 26px; line-height: 1; cursor: pointer; padding: 0 4px; transition: color 0.4s; font-weight: 300; }
.notes-new-btn:active { opacity: 0.6; }
.note-list-item { position: relative; padding: 14px 32px 14px 0; border-bottom: 1px solid var(--glass-border); cursor: pointer; transition: opacity 0.15s; }
.note-list-item:last-child { border-bottom: none; }
.note-list-item:active { opacity: 0.55; }
.note-delete-inline { position: absolute; right: 0; top: 50%; transform: translateY(-50%); color: rgba(255,80,80,0.55); font-size: 13px; padding: 8px 4px; cursor: pointer; }
.note-list-title { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.6s; }
.note-list-preview { font-size: 11px; color: var(--text-dim); letter-spacing: 0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.6s; }
.note-list-date { font-size: 9px; color: var(--text-dim); letter-spacing: 0.08em; margin-top: 4px; transition: color 0.6s; }
.notes-empty { text-align: center; color: var(--text-dim); font-size: 11px; padding: 40px 0; letter-spacing: 0.10em; }

/* NOTES — EDITOR VIEW */
.note-editor { display: none; position: absolute; inset: 0; z-index: 5;
  padding-top: calc(var(--safe-top) + 18px);
  padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px);
  padding-left: 18px; padding-right: 18px;
  overflow-y: auto; -webkit-overflow-scrolling: touch; }
.note-editor.open { display: flex; flex-direction: column; }
.note-editor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-shrink: 0; }
.note-back-btn { background: none; border: none; color: var(--accent); font-size: 20px; cursor: pointer; padding: 4px 4px 4px 0; font-family: var(--font); transition: color 0.4s; }
.note-back-btn:active { opacity: 0.6; }
.note-delete-btn { background: none; border: none; color: rgba(255,80,80,0.7); font-size: 16px; cursor: pointer; padding: 4px; font-family: var(--font); }
.note-delete-btn:active { color: rgba(255,80,80,1); }
.note-textarea { flex: 1; width: 100%; min-height: 300px; background: transparent; border: none; color: var(--text); font-family: var(--font); font-size: 16px; font-weight: 300; line-height: 1.8; outline: none; resize: none; -webkit-appearance: none; letter-spacing: 0.02em; transition: color 0.6s; }
.note-textarea::placeholder { color: var(--text-dim); }
.note-editor-meta { font-size: 9px; color: var(--text-dim); letter-spacing: 0.10em; margin-top: 8px; text-align: right; flex-shrink: 0; transition: color 0.6s; }

/* TAB BAR */
.tabbar { position: relative; z-index: 20; display: flex; height: calc(var(--tab-h) + var(--safe-bottom)); padding-bottom: var(--safe-bottom); background: var(--tabbar-bg); backdrop-filter: blur(36px); -webkit-backdrop-filter: blur(36px); border-top: 1px solid var(--glass-border); transition: background 0.6s, border-color 0.6s; }
.tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; background: none; border: none; color: var(--text-dim); cursor: pointer; padding-top: 8px; transition: color 0.2s; font-family: var(--font); }
.tab-btn.active { color: var(--accent); }
.tab-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.tab-icon svg { width: 20px; height: 20px; }
.tab-label { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }

/* SETTINGS */
.settings-panel { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; justify-content: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.28s ease; }
.settings-panel.open { opacity: 1; pointer-events: auto; }
.settings-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
.settings-sheet { position: relative; z-index: 1; background: var(--settings-bg); border-radius: 24px 24px 0 0; border-top: 1px solid var(--glass-border); padding: 28px 20px; padding-bottom: calc(28px + var(--safe-bottom)); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); transform: translateY(24px); transition: transform 0.28s ease, background 0.6s; }
.settings-panel.open .settings-sheet { transform: translateY(0); }
.settings-handle { width: 36px; height: 4px; background: rgba(128,128,128,0.3); border-radius: 2px; margin: 0 auto 24px; }
.settings-title { font-size: 8.5px; letter-spacing: 0.20em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 22px; font-weight: 500; }
.settings-section { margin-bottom: 26px; }
.settings-section-label { font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; opacity: 0.7; }
.color-swatches { display: flex; gap: 12px; flex-wrap: wrap; }
.swatch-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.color-swatch { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s, border-color 0.2s; }
.color-swatch.active { border-color: rgba(128,128,128,0.7); transform: scale(1.18); }
.color-swatch-label { font-size: 7.5px; color: var(--text-dim); letter-spacing: 0.05em; transition: color 0.6s; }
.theme-btns { display: flex; gap: 8px; }
.theme-btn { flex: 1; height: 44px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; transition: transform 0.2s, border-color 0.2s, opacity 0.2s; opacity: 0.6; position: relative; overflow: hidden; }
.theme-btn.active { border-color: var(--accent); opacity: 1; transform: scale(1.05); }
.theme-btn-label { position: absolute; bottom: 4px; left: 0; right: 0; text-align: center; font-size: 7px; letter-spacing: 0.10em; text-transform: uppercase; font-family: var(--font); font-weight: 500; }
.reset-btn { width: 100%; background: rgba(255,60,60,0.10); border: 1px solid rgba(255,60,60,0.22); border-radius: 12px; color: rgba(255,110,110,0.8); font-family: var(--font); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; padding: 14px; cursor: pointer; }
.reset-btn:active { background: rgba(255,60,60,0.20); }
.note-save-btn { position: absolute; bottom: 14px; right: 14px; background: var(--accent); border: none; border-radius: 50%; width: 38px; height: 38px; font-size: 18px; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, opacity 0.2s; }
.note-save-btn:active { transform: scale(0.9); }
.note-list-toggle { background: none; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; padding: 4px 4px 4px 0; transition: color 0.3s; }
.note-list-toggle:active { color: var(--accent); }
</style>
</head>
<body>

<div id="bgCanvas"></div>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-backdrop" onclick="toggleSettings()"></div>
  <div class="settings-sheet">
    <div class="settings-handle"></div>
    <div class="settings-title">Impostazioni</div>
    <div class="settings-section">
      <div class="settings-section-label">Sfondo</div>
      <div class="theme-btns" id="themeBtns"></div>
    </div>
    <div class="settings-section">
      <div class="settings-section-label">Colore accent</div>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>
    <div class="settings-section">
      <button class="reset-btn" onclick="resetAll()">&#8634;&nbsp; Ripristina defaults</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="pages">

    <!-- HOME -->
    <div class="page active" id="page-home">
      <div class="card clock-card">
        <div class="clock-time" id="clock">--:--</div>
        <div class="clock-date" id="datestr">---</div>
      </div>
      <div class="card">
        <div class="card-label">Meteo</div>
        <div class="wx-city-row">
          <input class="wx-city-input" id="cityInput" placeholder="città..." type="text" autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="wx-go-btn" onclick="hideAuto();loadWeather()">&#8594;</button>
          <div class="autocomplete-list" id="autoList" style="display:none"></div>
        </div>
        <div class="wx-top">
          <div class="wx-icon" id="wIcon"></div>
          <div class="wx-main">
            <div class="wx-temp" id="wTemp">--</div>
            <div class="wx-cond" id="wCond">---</div>
          </div>
        </div>
        <div class="wx-details">
          <div class="wx-detail"><div class="wx-detail-label">Percepita</div><div class="wx-detail-val" id="wFeel">--</div></div>
          <div class="wx-detail"><div class="wx-detail-label">Umidità</div><div class="wx-detail-val" id="wHum">--</div></div>
          <div class="wx-detail"><div class="wx-detail-label">Vento</div><div class="wx-detail-val" id="wWind">--</div></div>
          <div class="wx-detail"><div class="wx-detail-label">Visibilità</div><div class="wx-detail-val" id="wVis">--</div></div>
        </div>
        <div class="wx-update" id="lastUpdate"></div>
      </div>
      <div class="card">
        <div class="card-label">Luna · Accadde oggi</div>
        <div class="moon-row">
          <div class="moon-glyph" id="moonGlyph">&#9675;</div>
          <div>
            <div class="moon-name" id="moonName">---</div>
            <div class="moon-pct" id="moonPct">---</div>
          </div>
        </div>
        <div class="history-divider"></div>
        <div class="history-year" id="historyYear">----</div>
        <div class="history-text" id="historyText">carico...</div>
        <div class="history-nav">
          <button class="hist-btn" onclick="historyPrev()">&#8592;</button>
          <button class="hist-btn" onclick="historyNext()">&#8594;</button>
        </div>
      </div>
    </div>

    <!-- NEWS -->
    <div class="page" id="page-news">
      <div class="page-header">
        <span class="page-title">Notizie</span>
        <button class="refresh-btn" id="refreshBtn" onclick="refreshNews()">&#8635;</button>
      </div>
      <div class="feed-tabs">
        <div class="feed-tab active" onclick="switchFeed('ansa',this)">ANSA</div>
        <div class="feed-tab" onclick="switchFeed('gazza',this)">Gazza</div>
        <div class="feed-tab" onclick="switchFeed('ign',this)">IGN</div>
        <div class="feed-tab" onclick="switchFeed('wired',this)">Wired</div>
      </div>
      <div class="card">
        <div id="newsList"><div class="spinner">carico...</div></div>
      </div>
    </div>

    <!-- NOTE -->
    <div class="page" id="page-note">
      <!-- LISTA VIEW -->
      <div id="notesListView" style="display:none">
        <div class="notes-header">
          <span class="page-title">Note salvate</span>
          <button class="note-back-btn" onclick="showNoteEditor()">&#10005;</button>
        </div>
        <div class="card">
          <div id="notesList"><div class="notes-empty">Nessuna nota salvata</div></div>
        </div>
      </div>
      <!-- EDITOR VIEW — sempre visibile di default -->
      <div id="notesEditorView">
        <div class="notes-header">
          <span class="page-title">Note</span>
          <button class="note-list-toggle" id="noteListToggle" onclick="showNotesList()" title="Note salvate">&#9776;</button>
        </div>
        <div class="card" style="position:relative">
          <textarea class="note-textarea" id="noteArea" placeholder="scrivi qui..."></textarea>
          <button class="note-save-btn" id="noteSaveBtn" onclick="saveNewNote()" style="display:none">&#10003;</button>
        </div>
        <div class="note-editor-meta" id="noteMeta"></div>
      </div>
    </div>

  </div>

  <div class="tabbar">
    <button class="tab-btn active" id="tab-home" onclick="showPage('home')">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></span>
      <span class="tab-label">Home</span>
    </button>
    <button class="tab-btn" id="tab-news" onclick="showPage('news')">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="17" y2="13"/><line x1="7" y1="17" x2="13" y2="17"/></svg></span>
      <span class="tab-label">Notizie</span>
    </button>
    <button class="tab-btn" id="tab-note" onclick="showPage('note')">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></span>
      <span class="tab-label">Note</span>
    </button>
    <button class="tab-btn" id="tab-settings" onclick="toggleSettings()">
      <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>
      <span class="tab-label">Settings</span>
    </button>
  </div>
</div>

<script>
var SVG_ICONS = {

};

  {name:'Sabbia', hex:'#e8dcc8'},
  {name:'Salvia', hex:'#a8c4b8'},
  {name:'Ghiaccio', hex:'#a8c4d4'},
  {name:'Oro', hex:'#d4b86a'},
  {name:'Rosso', hex:'#ff2222'},
  {name:'Matrix', hex:'#00ff41'},
  {name:'Blu', hex:'#0088ff'},
  {name:'Fucsia', hex:'#ff00cc'},
  {name:'Giallo', hex:'#ffee00'},
  {name:'Bianco', hex:'#f0f0ee'},
];

var THEMES = [
  {id:'nero',label:'Nero',grad:'linear-gradient(160deg,#080808 0%,#111111 100%)',light:false},
  {id:'antracite',label:'Antracite',grad:'linear-gradient(160deg,#1a1a1c 0%,#2a2a2e 100%)',light:false},
  {id:'petrolio',label:'Petrolio',grad:'linear-gradient(160deg,#071a1a 0%,#0d3030 100%)',light:false},
  {id:'bianco',label:'Bianco',grad:'linear-gradient(160deg,#f0f0ee 0%,#e2e2de 100%)',light:true},
];

var MOON_GLYPHS = ['○', '☽', '◑', '◍', '●', '◎', '◐', '☾'];
var MOON_NAMES  = ['Luna nuova', 'Luna crescente', 'Quarto crescente', 'Gibbosa crescente', 'Luna piena', 'Gibbosa calante', 'Ultimo quarto', 'Falce calante'];
var WMO_TEXT = {'0':'Sereno','1':'Quasi sereno','2':'Parz. nuvoloso','3':'Coperto','45':'Nebbia','48':'Nebbia gelata','51':'Pioggerella','53':'Pioggerella','55':'Pioggerella','61':'Pioggia lieve','63':'Pioggia','65':'Pioggia forte','71':'Neve lieve','73':'Neve','75':'Neve forte','77':'Nevischio','80':'Rovesci','81':'Rovesci','82':'Rovesci forti','95':'Temporale','96':'Temp. grandine','99':'Temp. forte'};
var WMO_ICON_KEY = {'0':'sun','1':'partly','2':'partly','3':'cloudy','45':'fog','48':'fog','51':'rain','53':'rain','55':'rain','61':'rain','63':'rain','65':'rain','71':'snow','73':'snow','75':'snow','77':'sleet','80':'rain','81':'rain','82':'storm','95':'storm','96':'storm','99':'storm'};
var FEEDS = {
  ansa:  'https://www.ansa.it/sito/ansait_rss.xml',
  gazza: 'https://www.gazzetta.it/dynamic-feed/rss/section/home.xml',
  ign:   'https://feeds.feedburner.com/ign/news',
  wired: 'https://www.wired.com/feed/rss'
};
var currentFeed = 'ansa';
var currentTheme = 0;
var isLight = false;

/* ── THEME ── */
function buildThemeBtns() {
  var el = document.getElementById('themeBtns');
  THEMES.forEach(function(t, i) {
    var btn = document.createElement('div');
    btn.className = 'theme-btn';
    btn.style.background = t.grad;
    btn.style.color = t.light ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.6)';
    btn.innerHTML = '<span class="theme-btn-label">' + t.label + '</span>';
    btn.onclick = function() { applyTheme(i); };
    btn.id = 'tbtn' + i;
    el.appendChild(btn);
  });
}
function applyTheme(idx, save) {
  currentTheme = idx;
  var t = THEMES[idx];
  isLight = t.light;
  document.getElementById('bgCanvas').style.background = t.grad;
  if (isLight) {
    document.documentElement.style.setProperty('--text','rgba(20,20,20,0.90)');
    document.documentElement.style.setProperty('--text-dim','rgba(20,20,20,0.45)');
    document.documentElement.style.setProperty('--glass','rgba(0,0,0,0.06)');
    document.documentElement.style.setProperty('--glass-border','rgba(0,0,0,0.10)');
    document.documentElement.style.setProperty('--tabbar-bg','rgba(240,240,238,0.82)');
    document.documentElement.style.setProperty('--input-bg','rgba(0,0,0,0.05)');
    document.documentElement.style.setProperty('--detail-bg','rgba(0,0,0,0.04)');
    document.documentElement.style.setProperty('--autocomplete-bg','rgba(245,245,243,0.99)');
    document.documentElement.style.setProperty('--settings-bg','rgba(242,242,240,0.98)');
  } else {
    document.documentElement.style.setProperty('--text','rgba(255,255,255,0.92)');
    document.documentElement.style.setProperty('--text-dim','rgba(255,255,255,0.45)');
    document.documentElement.style.setProperty('--glass','rgba(255,255,255,0.07)');
    document.documentElement.style.setProperty('--glass-border','rgba(255,255,255,0.10)');
    document.documentElement.style.setProperty('--tabbar-bg','rgba(0,0,0,0.55)');
    document.documentElement.style.setProperty('--input-bg','rgba(255,255,255,0.07)');
    document.documentElement.style.setProperty('--detail-bg','rgba(255,255,255,0.05)');
    document.documentElement.style.setProperty('--autocomplete-bg','rgba(8,8,12,0.98)');
    document.documentElement.style.setProperty('--settings-bg','rgba(10,10,14,0.97)');
  }
  document.querySelectorAll('.theme-btn').forEach(function(b,i){ b.classList.toggle('active',i===idx); });
  if (save !== false) try { localStorage.setItem('dash_theme', idx); } catch(e) {}
}
buildThemeBtns();
try { var st=localStorage.getItem('dash_theme'); applyTheme(st!==null?parseInt(st):0,false); } catch(e) { applyTheme(0,false); }

/* ── TABS ── */
function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if (id !== 'note') closeEditor();
}

/* ── CLOCK ── */
function updateClock() {
  var now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('datestr').textContent = now.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();
}
updateClock(); setInterval(updateClock,1000);

/* ── COLOR ── */
var currentColorIdx = 0;
function applyColor(idx, save) {
  currentColorIdx = idx;
  document.documentElement.style.setProperty('--accent', COLORS[idx].hex);
  document.querySelectorAll('.color-swatch').forEach(function(s,i){ s.classList.toggle('active',i===idx); });
  if (save!==false) try { localStorage.setItem('dash_color',idx); } catch(e) {}
}
function buildSwatches() {
  var el = document.getElementById('colorSwatches');
  COLORS.forEach(function(c,i) {
    var wrap=document.createElement('div'); wrap.className='swatch-wrap';
    var s=document.createElement('div'); s.className='color-swatch'; s.style.background=c.hex;
    s.onclick=function(){ applyColor(i); };
    var lbl=document.createElement('div'); lbl.className='color-swatch-label'; lbl.textContent=c.name;
    wrap.appendChild(s); wrap.appendChild(lbl); el.appendChild(wrap);
  });
}
buildSwatches();
try { var sc=localStorage.getItem('dash_color'); applyColor(sc!==null?parseInt(sc):0,false); } catch(e) { applyColor(0,false); }

/* ── SETTINGS ── */
function toggleSettings() {
  var panel=document.getElementById('settingsPanel');
  panel.classList.toggle('open');
  document.getElementById('tab-settings').classList.toggle('active',panel.classList.contains('open'));
}

/* ── AUTOCOMPLETE ── */
var autoTimer=null;
document.getElementById('cityInput').addEventListener('input',function(){
  clearTimeout(autoTimer); var q=this.value.trim();
  if(q.length<2){hideAuto();return;}
  autoTimer=setTimeout(function(){fetchSuggestions(q);},350);
});
document.getElementById('cityInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'){this.blur();hideAuto();loadWeather();}
});
document.addEventListener('click',function(e){if(!e.target.closest('.wx-city-row'))hideAuto();});
function hideAuto(){document.getElementById('autoList').style.display='none';}
function fetchSuggestions(q){
  fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+'&count=5&language=it')
    .then(function(r){return r.json();})
    .then(function(data){
      var list=document.getElementById('autoList');
      if(!data.results||!data.results.length){hideAuto();return;}
      list.innerHTML='';
      data.results.forEach(function(r){
        var div=document.createElement('div'); div.className='autocomplete-item';
        var sub=[r.admin1,r.country_code?r.country_code.toUpperCase():''].filter(Boolean).join(' · ');
        div.innerHTML='<div>'+r.name+'</div>'+(sub?'<div class="autocomplete-sub">'+sub+'</div>':'');
        div.addEventListener('click',function(){document.getElementById('cityInput').value=r.name;hideAuto();loadWeather();});
        list.appendChild(div);
      });
      list.style.display='block';
    }).catch(function(){hideAuto();});
}

/* ── WEATHER ── */
function getIcon(code){return SVG_ICONS[WMO_ICON_KEY[String(code)]||'sun']||SVG_ICONS['sun'];}
function loadWeather(){
  var city=(document.getElementById('cityInput').value.trim())||'Roma';
  try{localStorage.setItem('dash_city',city);}catch(e){}
  fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(city)+'&count=1&language=it')
    .then(function(r){return r.json();})
    .then(function(gd){
      if(!gd.results||!gd.results.length) throw new Error('città non trovata');
      return fetch('https://api.open-meteo.com/v1/forecast?latitude='+gd.results[0].latitude+'&longitude='+gd.results[0].longitude+'&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,visibility,weather_code&wind_speed_unit=kmh&timezone=auto');
    })
    .then(function(r){return r.json();})
    .then(function(wd){
      var c=wd.current,code=c.weather_code;
      document.getElementById('wIcon').innerHTML=getIcon(code);
      document.getElementById('wTemp').textContent=Math.round(c.temperature_2m)+'°';
      document.getElementById('wCond').textContent=WMO_TEXT[String(code)]||'';
      document.getElementById('wFeel').textContent=Math.round(c.apparent_temperature)+'°C';
      document.getElementById('wHum').textContent=Math.round(c.relative_humidity_2m)+'%';
      document.getElementById('wWind').textContent=Math.round(c.wind_speed_10m)+' km/h';
      var vis=c.visibility;
      document.getElementById('wVis').textContent=vis>=1000?Math.round(vis/1000)+' km':Math.round(vis)+' m';
      document.getElementById('lastUpdate').textContent='agg. '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    }).catch(function(e){document.getElementById('wCond').textContent=e.message;});
}
try{var sc2=localStorage.getItem('dash_city');document.getElementById('cityInput').value=sc2||'Roma';}catch(e){document.getElementById('cityInput').value='Roma';}
loadWeather(); setInterval(loadWeather,600000);

/* ── MOON ── */
function moonPhase(){
  var now=new Date(),known=new Date(2000,0,6,18,14,0);
  var pct=((((now-known)/86400000)%29.53058867)+29.53058867)%29.53058867/29.53058867;
  var idx=Math.round(pct*8)%8;
  document.getElementById('moonGlyph').textContent=MOON_GLYPHS[idx];
  document.getElementById('moonName').textContent=MOON_NAMES[idx];
  document.getElementById('moonPct').textContent=Math.round(pct*100)+'% del ciclo';
}
moonPhase();

/* ── HISTORY ── */
var histEvents=[],histIdx=0;
function loadHistory(){
  var now=new Date();
  fetch('https://api.wikimedia.org/feed/v1/wikipedia/it/onthisday/events/'+(now.getMonth()+1)+'/'+now.getDate())
    .then(function(r){return r.json();})
    .then(function(data){
      histEvents=data.events||[];
      if(!histEvents.length) throw new Error();
      histIdx=Math.floor(Math.random()*histEvents.length); showHistEvent();
    }).catch(function(){
      fetch('https://api.wikimedia.org/feed/v1/wikipedia/en/onthisday/events/'+(new Date().getMonth()+1)+'/'+new Date().getDate())
        .then(function(r){return r.json();})
        .then(function(data){histEvents=data.events||[];if(histEvents.length){histIdx=Math.floor(Math.random()*histEvents.length);showHistEvent();}else document.getElementById('historyText').textContent='non disponibile';})
        .catch(function(){document.getElementById('historyText').textContent='non disponibile';});
    });
}
function showHistEvent(){if(!histEvents.length)return;document.getElementById('historyYear').textContent=histEvents[histIdx].year;document.getElementById('historyText').textContent=histEvents[histIdx].text;}
function historyPrev(){if(!histEvents.length)return;histIdx=(histIdx-1+histEvents.length)%histEvents.length;showHistEvent();}
function historyNext(){if(!histEvents.length)return;histIdx=(histIdx+1)%histEvents.length;showHistEvent();}
loadHistory();

/* ── NEWS ── */
function isAd(t){t=t.toLowerCase();var w=['save $','% off','deal','now just','coupon','discount','limited time','buy now'];for(var i=0;i<w.length;i++)if(t.indexOf(w[i])!==-1)return true;return false;}
function renderNews(items){
  var el=document.getElementById('newsList');
  items=items.filter(function(it){return !isAd(it.title||'');});
  items.sort(function(a,b){return new Date(b.pubDate)-new Date(a.pubDate);});
  if(!items.length){el.innerHTML='<div class="spinner">nessun risultato</div>';return;}
  var html='';
  for(var i=0;i<Math.min(items.length,14);i++){
    var it=items[i],title=(it.title||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'),link=(it.link||'#').trim(),t='';
    try{t=new Date(it.pubDate).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});}catch(ex){}
    html+='<div class="news-item" data-href="'+link+'"><div class="news-title">'+title+'</div>'+(t?'<div class="news-time">'+t+'</div>':'')+'</div>';
  }
  el.innerHTML=html;
  el.querySelectorAll('.news-item').forEach(function(item){item.addEventListener('click',function(){var h=this.getAttribute('data-href');if(h)window.open(h,'_blank');});});
}
function loadNews(){
  document.getElementById('newsList').innerHTML='<div class="spinner">carico...</div>';
  fetch('https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(FEEDS[currentFeed]))
    .then(function(r){return r.json();})
    .then(function(data){if(data.status!=='ok'||!data.items||!data.items.length)throw new Error('feed non disponibile');renderNews(data.items);})
    .catch(function(e){document.getElementById('newsList').innerHTML='<div class="spinner">'+e.message+'</div>';});
}
function switchFeed(id,el){currentFeed=id;document.querySelectorAll('.feed-tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');loadNews();}
function refreshNews(){var btn=document.getElementById('refreshBtn');btn.style.transition='transform 0.5s';btn.style.transform='rotate(360deg)';setTimeout(function(){btn.style.transition='';btn.style.transform='';},550);loadNews();}
loadNews(); setInterval(loadNews,300000);

/* ── NOTES ── */
var notes = [];

function loadNotes(){
  try{ notes=JSON.parse(localStorage.getItem('dash_notes')||'[]'); }catch(e){notes=[];}
  renderNotesList();
  // editor sempre pulito all'avvio
  document.getElementById('noteArea').value='';
  document.getElementById('noteMeta').textContent='';
  document.getElementById('noteSaveBtn').style.display='none';
}

function saveNotes(){
  try{localStorage.setItem('dash_notes',JSON.stringify(notes));}catch(e){}
}

function renderNotesList(){
  var el=document.getElementById('notesList');
  if(!notes.length){el.innerHTML='<div class="notes-empty">Nessuna nota salvata</div>';return;}
  var html='';
  notes.slice().sort(function(a,b){return b.updated-a.updated;}).forEach(function(n){
    var text=(n.text||'').trim();
    var preview=text.replace(/\n/g,' ').substring(0,80);
    var d=new Date(n.updated);
    var dateStr=d.toLocaleDateString('it-IT',{day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    preview=preview.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html+='<div class="note-list-item" data-id="'+n.id+'">'
      +'<div class="note-list-date">'+dateStr+'</div>'
      +(preview?'<div class="note-list-preview">'+preview+'</div>':'')
      +'<div class="note-delete-inline" data-id="'+n.id+'">&#10005;</div>'
      +'</div>';
  });
  el.innerHTML=html;
  el.querySelectorAll('.note-list-item').forEach(function(item){
    item.addEventListener('click',function(e){
      if(e.target.classList.contains('note-delete-inline')) return;
      loadNoteIntoEditor(this.getAttribute('data-id'));
    });
  });
  el.querySelectorAll('.note-delete-inline').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var id=this.getAttribute('data-id');
      notes=notes.filter(function(x){return x.id!==id;});
      saveNotes();
      renderNotesList();
    });
  });
}

function loadNoteIntoEditor(id){
  var n=notes.find(function(x){return x.id===id;});
  if(!n) return;
  document.getElementById('noteArea').value=n.text||'';
  // rimuovi dalla lista e riapri come bozza
  notes=notes.filter(function(x){return x.id!==id;});
  saveNotes();
  renderNotesList();
  showNoteEditor();
  updateNoteMeta();
  document.getElementById('noteSaveBtn').style.display='flex';
}

function saveNewNote(){
  var text=document.getElementById('noteArea').value.trim();
  if(!text) return;
  notes.push({id:Date.now().toString(),text:text,updated:Date.now()});
  saveNotes();
  document.getElementById('noteArea').value='';
  document.getElementById('noteMeta').textContent='';
  document.getElementById('noteSaveBtn').style.display='none';
  renderNotesList();
}

function showNotesList(){
  renderNotesList();
  document.getElementById('notesEditorView').style.display='none';
  document.getElementById('notesListView').style.display='block';
}

function showNoteEditor(){
  document.getElementById('notesListView').style.display='none';
  document.getElementById('notesEditorView').style.display='block';
}

function updateNoteMeta(){
  var val=document.getElementById('noteArea').value;
  var wc=val.trim()?val.trim().split(/\s+/).length:0;
  document.getElementById('noteMeta').textContent=wc?wc+' parole':'';
}

document.getElementById('noteArea').addEventListener('input',function(){
  var hasText=this.value.trim().length>0;
  document.getElementById('noteSaveBtn').style.display=hasText?'flex':'none';
  updateNoteMeta();
});

loadNotes();

/* ── RESET ── */
function resetAll(){

  try{localStorage.removeItem('dash_notes');localStorage.removeItem('dash_city');localStorage.removeItem('dash_color');localStorage.removeItem('dash_theme');}catch(e){}
  notes=[];
  document.getElementById('noteArea').value='';
  document.getElementById('noteSaveBtn').style.display='none';
  document.getElementById('noteMeta').textContent='';
  document.getElementById('notesListView').style.display='none';
  document.getElementById('notesEditorView').style.display='block';
  renderNotesList();
  document.getElementById('cityInput').value='Roma';
  applyColor(0); applyTheme(0); loadWeather();
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('tab-settings').classList.remove('active');
}
</script>
